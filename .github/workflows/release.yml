name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Compute image name
        run: |
          image_name="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=${image_name}" >> "${GITHUB_ENV}"

      - name: Build Python package
        run: uv build

      - name: Build Docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${GITHUB_REF_NAME}" \
            -t "${IMAGE_NAME}:latest" \
            .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:${GITHUB_REF_NAME}"
          docker push "${IMAGE_NAME}:latest"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --generate-notes \
            --notes "Container image: ${IMAGE_NAME}:${GITHUB_REF_NAME}"
