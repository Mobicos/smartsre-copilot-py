name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-paused:
    name: Release Paused
    runs-on: ubuntu-latest
    steps:
      - name: Explain release pause
        run: |
          echo "Public releases are paused until the native Agent 1.0 scope is complete."
          echo "Do not publish tags, GitHub Releases, or GHCR release images from this branch."
          exit 1
