name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: Pull Request Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          scopes='agent|aiops|api|chat|frontend|knowledge|mcp|persistence|worker|docs|local|ci|actions|deps|docker|security|tests|tooling|repo'
          pattern="^(feat|fix|ci|chore|docs|test|refactor|perf)\(($scopes)\): [a-z0-9].+$"
          bump_pattern='^(chore\(deps\)|chore\(docker\)|ci\(actions\)): bump .+$'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must match: <type>(<scope>): <concise action summary>"
            echo "Allowed types: feat, fix, ci, chore, docs, test, refactor, perf"
            echo "Allowed scopes: $scopes"
            echo "Current title: $PR_TITLE"
            exit 1
          fi
          if [[ "$PR_TITLE" == *"bump "* && ! "$PR_TITLE" =~ $bump_pattern ]]; then
            echo "Dependency bump PR titles must use one of these scopes:"
            echo "- chore(deps): bump ..."
            echo "- chore(docker): bump ..."
            echo "- ci(actions): bump ..."
            echo "Current title: $PR_TITLE"
            exit 1
          fi

  backend:
    name: Backend Quality Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smartsre
          POSTGRES_PASSWORD: smartsre
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartsre -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Compile source files
        run: uv run python -m compileall app mcp_servers tests

      - name: Lint with Ruff
        run: uv run python -m ruff check app mcp_servers tests

      - name: Check formatting with Ruff
        run: uv run python -m ruff format --check app mcp_servers tests

      - name: Type check with mypy
        run: uv run python -m mypy app --ignore-missing-imports

      - name: Security scan with Bandit
        run: uv run python -m bandit -r app -ll

      - name: Run tests
        env:
          SMARTSRE_TEST_POSTGRES_HOST: localhost
        run: uv run python -m pytest tests -q

  frontend:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Type check frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build
