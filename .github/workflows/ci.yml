name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: Pull Request Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          scopes='agent|aiops|api|chat|frontend|knowledge|mcp|persistence|worker|docs|local|ci|actions|deps|docker|security|tests|tooling|repo'
          pattern="^(feat|fix|ci|chore|docs|test|refactor|perf)\(($scopes)\): [a-z0-9].+$"
          bump_pattern='^(chore\(deps\)|chore\(docker\)|ci\(actions\)): bump .+$'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must match: <type>(<scope>): <concise action summary>"
            echo "Allowed types: feat, fix, ci, chore, docs, test, refactor, perf"
            echo "Allowed scopes: $scopes"
            echo "Current title: $PR_TITLE"
            exit 1
          fi
          if [[ "$PR_TITLE" == *"bump "* && ! "$PR_TITLE" =~ $bump_pattern ]]; then
            echo "Dependency bump PR titles must use one of these scopes:"
            echo "- chore(deps): bump ..."
            echo "- chore(docker): bump ..."
            echo "- ci(actions): bump ..."
            echo "Current title: $PR_TITLE"
            exit 1
          fi

  backend:
    name: Backend Quality Checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: smartsre
          POSTGRES_PASSWORD: smartsre
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartsre -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Check database migrations
        env:
          POSTGRES_DSN: postgresql://smartsre:smartsre@localhost:5432/postgres
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Compile source files
        run: uv run python -m compileall app mcp_servers scripts tests

      - name: Lint with Ruff
        run: uv run python -m ruff check app mcp_servers scripts tests

      - name: Check formatting with Ruff
        run: uv run python -m ruff format --check app mcp_servers scripts tests

      - name: Type check with mypy
        run: uv run python -m mypy app scripts --ignore-missing-imports

      - name: Security scan with Bandit
        run: uv run python -m bandit -r app -ll

      - name: Check OpenAPI contract
        run: uv run python scripts/export_openapi.py --check

      - name: Run tests
        env:
          SMARTSRE_TEST_POSTGRES_HOST: localhost
        run: uv run python -m pytest tests -q

  frontend:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Type check frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

  docker:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare compose environment
        run: cp .env.example .env

      - name: Validate compose configuration
        run: docker compose -f docker-compose.yml config --quiet

      - name: Build backend image
        run: docker build -t smartsre-copilot:ci .

      - name: Scan backend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: smartsre-copilot:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: smartsre
          POSTGRES_PASSWORD: smartsre
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartsre -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      POSTGRES_DSN: postgresql://smartsre:smartsre@localhost:5432/postgres
      SMARTSRE_BACKEND_URL: http://localhost:9900
      SMARTSRE_TEST_POSTGRES_HOST: localhost
      AGENT_DECISION_PROVIDER: deterministic
      TASK_DISPATCHER_MODE: embedded
      MCP_TOOLS_LOAD_TIMEOUT_SECONDS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.18.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply database migrations
        run: uv run alembic upgrade head

      - name: Start backend
        run: |
          nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 9900 > backend.log 2>&1 &
          echo $! > backend.pid
        env:
          POSTGRES_DSN: postgresql://smartsre:smartsre@localhost:5432/postgres
          AGENT_DECISION_PROVIDER: deterministic
          TASK_DISPATCHER_MODE: embedded
          MCP_TOOLS_LOAD_TIMEOUT_SECONDS: "1"

      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9900/health/live; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become live in time."
          cat backend.log
          exit 1

      - name: Run E2E tests
        working-directory: frontend
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
          retention-days: 7

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
