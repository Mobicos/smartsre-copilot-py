services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.17
    restart: unless-stopped
    profiles:
      - vector-milvus
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    profiles:
      - vector-milvus
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.15
    restart: unless-stopped
    profiles:
      - vector-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.6
    restart: unless-stopped
    profiles:
      - vector-milvus
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: standalone:19530
    depends_on:
      - standalone

  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartsre-postgres
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartsre}
      POSTGRES_USER: ${POSTGRES_USER:-smartsre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-postgres-password}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsre -d smartsre"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: smartsre-redis
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    command:
      [
        "sh",
        "-c",
        "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; else redis-server --appendonly yes; fi",
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-app:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: smartsre-minio
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dev-only-minio-user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev-only-minio-password}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ./volumes/minio-app:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-migrate
    command: ["uv", "run", "alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://smartsre:dev-only-postgres-password@postgres:5432/smartsre}
      POSTGRES_CONNECT_TIMEOUT_SECONDS: ${POSTGRES_CONNECT_TIMEOUT_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-backend
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://smartsre:dev-only-postgres-password@postgres:5432/smartsre}
      POSTGRES_CONNECT_TIMEOUT_SECONDS: ${POSTGRES_CONNECT_TIMEOUT_SECONDS:-5}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TASK_QUEUE_BACKEND: redis
      TASK_DISPATCHER_MODE: detached
      AGENT_DECISION_PROVIDER: ${AGENT_DECISION_PROVIDER:-qwen}
      OBJECT_STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio-app:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-dev-only-minio-user}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-dev-only-minio-password}
    ports:
      - "9900:9900"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9900/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-app:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-worker
    command: ["uv", "run", "python", "-m", "app.worker"]
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://smartsre:dev-only-postgres-password@postgres:5432/smartsre}
      POSTGRES_CONNECT_TIMEOUT_SECONDS: ${POSTGRES_CONNECT_TIMEOUT_SECONDS:-5}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TASK_QUEUE_BACKEND: redis
      TASK_DISPATCHER_MODE: detached
      AGENT_DECISION_PROVIDER: ${AGENT_DECISION_PROVIDER:-qwen}
      OBJECT_STORAGE_BACKEND: minio
      MINIO_ENDPOINT: minio-app:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-dev-only-minio-user}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-dev-only-minio-password}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"from app.infrastructure import redis_manager; raise SystemExit(0 if redis_manager.health_check() else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-app:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Gateway profile: Caddy reverse proxy + frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartsre-frontend
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      SMARTSRE_BACKEND_URL: http://backend:9900
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - gateway

  caddy:
    image: caddy:2-alpine
    container_name: smartsre-caddy
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./volumes/caddy:/data
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    profiles:
      - gateway

  # ---------------------------------------------------------------------------
  # Observability profile: OTel Collector + Prometheus + Grafana + Loki
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: smartsre-otel
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: smartsre-prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11.5.2
    container_name: smartsre-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./volumes/grafana:/var/lib/grafana
    profiles:
      - observability

  loki:
    image: grafana/loki:3.4.2
    container_name: smartsre-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./volumes/loki:/loki
    profiles:
      - observability

networks:
  default:
    name: smartsre
