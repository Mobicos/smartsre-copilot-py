services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.6.11
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.15
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.6
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: standalone:19530
    depends_on:
      - standalone

  postgres:
    image: postgres:18
    container_name: smartsre-postgres
    environment:
      POSTGRES_DB: smartsre
      POSTGRES_USER: smartsre
      POSTGRES_PASSWORD: smartsre
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsre -d smartsre"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    container_name: smartsre-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-migrate
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://smartsre:smartsre@postgres:5432/smartsre
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-app
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://smartsre:smartsre@postgres:5432/smartsre
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_BACKEND: redis
      TASK_DISPATCHER_MODE: detached
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
    ports:
      - "9900:9900"
    depends_on:
      standalone:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-worker
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://smartsre:smartsre@postgres:5432/smartsre
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_BACKEND: redis
      TASK_DISPATCHER_MODE: detached
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
    depends_on:
      standalone:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  default:
    name: smartsre
