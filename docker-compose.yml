services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.6.11
    profiles:
      - vector-milvus
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    profiles:
      - vector-milvus
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.15
    profiles:
      - vector-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.6
    profiles:
      - vector-milvus
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: standalone:19530
    depends_on:
      - standalone

  postgres:
    image: pgvector/pgvector:pg18
    container_name: smartsre-postgres
    environment:
      POSTGRES_DB: smartsre
      POSTGRES_USER: smartsre
      POSTGRES_PASSWORD: smartsre
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsre -d smartsre"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    container_name: smartsre-redis
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-migrate
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://smartsre:smartsre@postgres:5432/smartsre
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-backend
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://smartsre:smartsre@postgres:5432/smartsre
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_BACKEND: redis
      TASK_DISPATCHER_MODE: detached
    ports:
      - "9900:9900"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartsre-worker
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      POSTGRES_DSN: postgresql://smartsre:smartsre@postgres:5432/smartsre
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_BACKEND: redis
      TASK_DISPATCHER_MODE: detached
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Gateway profile: Caddy reverse proxy + frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartsre-frontend
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      SMARTSRE_BACKEND_URL: http://backend:9900
    profiles:
      - gateway

  caddy:
    image: caddy:2-alpine
    container_name: smartsre-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./volumes/caddy:/data
    depends_on:
      - backend
      - frontend
    profiles:
      - gateway

  # ---------------------------------------------------------------------------
  # Observability profile: OTel Collector + Prometheus + Grafana + Loki
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: smartsre-otel
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: smartsre-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11.5.2
    container_name: smartsre-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./volumes/grafana:/var/lib/grafana
    profiles:
      - observability

  loki:
    image: grafana/loki:3.4.2
    container_name: smartsre-loki
    ports:
      - "3100:3100"
    volumes:
      - ./volumes/loki:/loki
    profiles:
      - observability

networks:
  default:
    name: smartsre
